name: release

# Publishes to PyPI when a version tag (v*) is pushed, via Trusted Publishing
# (OIDC) -- no API token stored anywhere. One-time setup: on pypi.org add a
# pending publisher for project "fabri", owner "Rushour0", repo "fabri",
# workflow "release.yml", environment "pypi". Then: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
