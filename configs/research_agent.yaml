agent:
  name: research-agent
  max_steps: 10

llm:
  provider: gemini                 # or "anthropic" / "openai" / "openrouter" (all SDKs bundled)
  model: gemini-2.5-pro
  max_tokens: 1024
  api_key_env: GEMINI_API_KEY

tools:
  manifest_dir: src/fabri/tools/examples
  enabled: [web_search, read_file, write_file]
  sandbox_root: .
  decompose:
    enabled: true
    max_subquestions: 5

memory:
  collection: research_fabri
  qdrant_url: http://localhost:6333
  top_k: 5
  similarity_threshold: 0.85
  promotion_threshold_sessions: 3
  guideline_max_tokens: 30
